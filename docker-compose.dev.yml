version: "3.9"

# Development overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# After the first build, code changes reload automatically:
#   - Frontend : Next.js hot reload (no restart needed)
#   - Backend  : Air live reload    (recompiles on .go file save)

volumes:
  go_mod_cache:
  npm_modules:

services:

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app          # mount source code
      - npm_modules:/app/node_modules  # preserve node_modules from image
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:8080
      WATCHPACK_POLLING: "true"  # ensure hot reload works inside Docker

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app           # mount source code
      - go_mod_cache:/root/go/pkg/mod  # cache downloaded modules
    environment:
      DB_HOST: postgres
      MINIO_ENDPOINT: minio:9000
      MINIO_PUBLIC_ENDPOINT: http://localhost:9000
      REDIS_ADDR: redis:6379
